<!DOCTYPE html>
<html lang="gu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Balopasna</title>

<style>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<script>
Pi.init({ version: "2.0", sandbox: false });

async function loginPi() {
  try {
    const scopes = ['username', 'payments'];
    const auth = await Pi.authenticate(scopes, function(payment) {});
    alert("Welcome " + auth.user.username);
  } catch (err) {
    alert("Login failed");
  }
}
</script>

<button onclick="loginPi()">
  Login with Pi
</button>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    text-align:center;
    margin:0;
}

header{
    background:#ff9933;
    color:white;
    padding:20px;
}

.container{
    padding:20px;
}

.card{
    background:white;
    margin:10px;
    padding:15px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

button{
    background:#ff9933;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
    <h1>🕉️ Balopasna</h1>
    <p>શરીર, મન અને આત્માની ઉપાસના</p>
</header>

<div class="container">

<div class="card">
    <h2>🕉️ Mantra</h2>
    <p>મંત્ર પાઠ અને ઓડિયો</p>
</div>

<div class="card">

</div>

<div class="card">

</div>

<div class="card">
    <h2>🏃 Vyayam</h2>
    <p>દૈનિક કસરત</p>
</div>

<div class="card">
    <h2>🌬️ Pranayam</h2>
    <p>અનુલોમ વિલોમ, કપાલભાતી</p>
</div>

<div class="card">
    <h2>🎵 Music</h2>

</div>

<button onclick="alert('જય શ્રી રામ 🚩')">
    આજે ઉપાસના શરૂ કરો
</button>

</div>
